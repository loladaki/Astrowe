<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#070a12" />
  <title>Astrowe — vale a pena sair esta noite?</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <div class="shell">

    <header class="brand">
      <h1>Astrowe</h1>
      <p class="tagline">Vale a pena sair esta noite?</p>
    </header>

    <section class="controls">
      <form id="search-form" autocomplete="off">
        <div class="search-wrap">
          <input id="place" type="text" placeholder="Onde vais observar?"
                 role="combobox" aria-expanded="false" aria-autocomplete="list"
                 aria-controls="suggestions" />
          <ul id="suggestions" class="suggestions" role="listbox" hidden></ul>
        </div>
        <button type="button" id="geo-btn" class="btn-icon" title="Usar a minha localização">📍</button>
        <button type="button" id="map-btn" class="btn-icon" title="Escolher no mapa">🗺</button>
        <button type="submit" class="btn-primary">Ver noites</button>
      </form>

      <div class="controls-row">
        <div class="segmented" role="group" aria-label="Tipo de observação">
          <button type="button" class="mode-btn is-active" data-mode="deepsky">Céu profundo</button>
          <button type="button" class="mode-btn" data-mode="planetary">Planetas e Lua</button>
        </div>
        <div class="places">
          <div id="saved-list" class="saved-list"></div>
          <button type="button" id="save-btn" class="btn-ghost" hidden>+ Guardar local</button>
          <button type="button" id="compare-btn" class="btn-ghost" hidden>Comparar</button>
        </div>
      </div>

      <div id="save-form" class="save-form" hidden>
        <input id="save-name" type="text" placeholder="Nome do local (ex.: Covão)" />
        <button type="button" id="save-confirm" class="btn-primary">Guardar</button>
        <button type="button" id="save-cancel" class="btn-ghost">Cancelar</button>
      </div>
    </section>

    <p id="status" class="status" hidden></p>

    <section id="result" class="result" hidden>
      <div class="place-line">
        <span id="place-name" class="place-name"></span>
        <span id="place-sky" class="place-sky"></span>
      </div>

      <nav id="strip" class="strip" aria-label="Próximas noites"></nav>

      <div id="detail" class="detail"></div>
    </section>

    <footer>
      <a href="https://open-meteo.com" target="_blank" rel="noopener">Open-Meteo</a> ·
      <a href="https://rhodesmill.org/skyfield/" target="_blank" rel="noopener">Skyfield</a> ·
      <a href="https://www.lightpollutionmap.info" target="_blank" rel="noopener">lightpollutionmap</a>
    </footer>
  </div>

  <div id="map-modal" class="modal" hidden>
    <div class="modal-box">
      <div class="modal-head">
        <strong>Escolhe o local no mapa</strong>
        <button type="button" id="map-close" class="btn-icon" title="Fechar">✕</button>
      </div>
      <div id="map"></div>
      <div class="modal-foot">
        <span id="map-coords">Clica no mapa para escolher um ponto.</span>
        <button type="button" id="map-confirm" class="btn-primary" disabled>Usar este local</button>
      </div>
    </div>
  </div>

  <div id="compare-modal" class="modal" hidden>
    <div class="modal-box">
      <div class="modal-head">
        <strong>Os teus locais, noite a noite</strong>
        <button type="button" id="compare-close" class="btn-icon" title="Fechar">✕</button>
      </div>
      <div id="compare-body" class="compare-body"></div>
    </div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="/app.js"></script>
</body>
</html>
