<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Astrowe — vale a pena sair esta noite?</title>
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <header>
    <h1>Astrowe</h1>
    <p class="tagline">Das próximas noites, qual vale a pena? Um score, não uma tabela.</p>
  </header>

  <form id="search-form" autocomplete="off">
    <input id="place" type="text" placeholder="Localidade (ex.: Fundão, Covilhã…)" />
    <button type="submit">Ver noites</button>
    <button type="button" id="geo-btn" title="Usar a minha localização">📍</button>
  </form>

  <p id="status" class="status" hidden></p>
  <p id="summary" class="summary" hidden></p>

  <main id="nights" class="nights"></main>

  <footer>
    Dados: <a href="https://open-meteo.com" target="_blank" rel="noopener">Open-Meteo</a>
    · Efemérides: <a href="https://rhodesmill.org/skyfield/" target="_blank" rel="noopener">Skyfield</a>
  </footer>

  <script src="/app.js"></script>
</body>
</html>
