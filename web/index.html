<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Astrowe — vale a pena sair esta noite?</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <header>
    <h1>Astrowe</h1>
    <p class="tagline">Das próximas noites, qual vale a pena? Um score, não uma tabela.</p>
  </header>

  <form id="search-form" autocomplete="off">
    <div class="search-wrap">
      <input id="place" type="text" placeholder="Localidade (ex.: Fundão, Covilhã…)"
             role="combobox" aria-expanded="false" aria-autocomplete="list"
             aria-controls="suggestions" />
      <ul id="suggestions" class="suggestions" role="listbox" hidden></ul>
    </div>
    <button type="submit">Ver noites</button>
    <button type="button" id="geo-btn" title="Usar a minha localização">📍</button>
    <button type="button" id="map-btn" title="Escolher no mapa">🗺️</button>
  </form>

  <div id="map-modal" class="modal" hidden>
    <div class="modal-box">
      <div class="modal-head">
        <strong>Escolhe o local no mapa</strong>
        <button type="button" id="map-close" title="Fechar">✕</button>
      </div>
      <div id="map"></div>
      <div class="modal-foot">
        <span id="map-coords">Clica no mapa para escolher um ponto.</span>
        <button type="button" id="map-confirm" disabled>Usar este local</button>
      </div>
    </div>
  </div>

  <div class="saved-bar">
    <div id="saved-list" class="saved-list"></div>
    <button type="button" id="save-btn" hidden>★ Guardar este local</button>
    <button type="button" id="compare-btn" hidden>⚖ Comparar locais</button>
  </div>

  <div id="save-form" class="save-form" hidden>
    <input id="save-name" type="text" placeholder="Nome do local (ex.: Covão)" />
    <button type="button" id="save-confirm">Guardar</button>
    <button type="button" id="save-cancel">Cancelar</button>
  </div>

  <div id="compare-modal" class="modal" hidden>
    <div class="modal-box">
      <div class="modal-head">
        <strong>Os teus locais, noite a noite</strong>
        <button type="button" id="compare-close" title="Fechar">✕</button>
      </div>
      <div id="compare-body" class="compare-body"></div>
    </div>
  </div>

  <div class="modes" role="group" aria-label="Tipo de observação">
    <button type="button" class="mode-btn active" data-mode="deepsky">🌌 Céu profundo</button>
    <button type="button" class="mode-btn" data-mode="planetary">🪐 Planetas e Lua</button>
  </div>

  <p id="status" class="status" hidden></p>
  <p id="summary" class="summary" hidden></p>
  <p id="site" class="site" hidden></p>

  <main id="nights" class="nights"></main>

  <footer>
    Dados: <a href="https://open-meteo.com" target="_blank" rel="noopener">Open-Meteo</a>
    · Efemérides: <a href="https://rhodesmill.org/skyfield/" target="_blank" rel="noopener">Skyfield</a>
  </footer>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="/app.js"></script>
</body>
</html>
